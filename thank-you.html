<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #ffffff;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      max-width: 400px;
    }

    h1 {
      color: #2c7be5;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      text-decoration: none;
      background: #2c7be5;
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
    }

    a:hover {
      background: #1a5edb;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Thank You!</h1>
    <p>Your message has been sent successfully.</p>
    <p>We will get back to you shortly.</p>

    <a href="/">Go Back Home</a>
  </div>
</body>
</html>
